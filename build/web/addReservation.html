<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Reservation</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .box { max-width: 650px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input, select { width: 100%; padding: 8px; margin: 8px 0; }
        button { padding: 10px 15px; }
        .row { display: flex; gap: 12px; }
        .col { flex: 1; }
        .error { color: red; display: none; }
        a { text-decoration: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>Add New Reservation</h2>

    <p id="dateError" class="error">Check-out date must be AFTER check-in date!</p>

    <form action="AddReservationServlet" method="post" onsubmit="return validateDates();">
        <label>Reservation No:</label>
        <input type="text" name="reservation_no" placeholder="R001" required>

        <label>Guest Name:</label>
        <input type="text" name="guest_name" required>

        <label>Address:</label>
        <input type="text" name="address">

        <label>Contact Number:</label>
        <input type="text" name="contact" placeholder="07XXXXXXXX" required>

        <label>Room Type:</label>
        <select name="room_type" required>
            <option value="">-- Select --</option>
            <option value="Standard">Standard</option>
            <option value="Deluxe">Deluxe</option>
            <option value="Suite">Suite</option>
        </select>

        <div class="row">
            <div class="col">
                <label>Check-in Date:</label>
                <input type="date" name="check_in" id="check_in" required>
            </div>
            <div class="col">
                <label>Check-out Date:</label>
                <input type="date" name="check_out" id="check_out" required>
            </div>
        </div>

        <button type="submit">Save Reservation</button>
    </form>

    <br>
    <a href="DashboardServlet">⬅ Back to Dashboard</a>
</div>

<script>
function validateDates(){
    const inDate = document.getElementById("check_in").value;
    const outDate = document.getElementById("check_out").value;

    if(inDate && outDate && outDate <= inDate){
        document.getElementById("dateError").style.display = "block";
        return false;
    }
    document.getElementById("dateError").style.display = "none";
    return true;
}
</script>

</body>
</html>
