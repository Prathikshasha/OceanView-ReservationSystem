<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Calculate Bill</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .box { max-width: 600px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 8px 0; }
        button { padding: 10px 15px; }
        a { text-decoration: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>Calculate Bill</h2>

    <form action="BillServlet" method="get">
        <label>Enter Reservation No:</label>
        <input type="text" name="reservation_no" placeholder="R001" required>

        <button type="submit">Generate Bill</button>
    </form>

    <br>
    <a href="DashboardServlet">⬅ Back to Dashboard</a>
</div>

</body>
</html>
